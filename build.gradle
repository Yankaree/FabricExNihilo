plugins {
    id 'fabric-loom' version '1.16-SNAPSHOT'
    id 'maven-publish'
}

group = 'me.ngcsonsplash.fabricaeexnihilo'
version = '1.0.0+mc1.21.11'
plugins {
    id 'fabric-loom' version '1.16-SNAPSHOT'
    id 'maven-publish'
    id 'base' // thêm plugin base để dùng archiveBaseName
}

group = 'me.ngcsonsplash.fabricaeexnihilo'
version = '1.0.0+mc1.21.11'

base {
    archivesName.set('FabricExNihilo') // dùng method set()
}

repositories {
    mavenCentral()
    
    // Fabric
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://maven.shedaniel.me/" }
    maven { url "https://maven.terraformersmc.com/" }
    maven { url "https://maven.wispforest.io" }
    maven { url "https://maven.architectury.dev/" }
    
    // YACL official repository
    maven {
        url "https://maven.isxander.dev/releases"
        content {
            includeGroup "dev.isxander"
        }
    }
    
    // Other common repositories
    maven { url "https://jitpack.io" }
    maven { url "https://maven.modrinth.com/repository/releases" }
}

dependencies {
    // Minecraft + mappings + loader + fabric api
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.6:v2"
    modImplementation "net.fabricmc:fabric-loader:0.19.2"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.4+1.21.11"

    // Libraries
    modImplementation "dev.isxander:yet-another-config-lib:3.5.0+1.21.11-fabric"
    modCompileOnly "me.shedaniel:RoughlyEnoughItems-api-fabric:10.1.1"
    modCompileOnly "com.terraformersmc:modmenu:9.0.2"
    modCompileOnly "dev.emi:emi-fabric:0.6.0:api"
    modCompileOnly "dev.architectury:architectury-fabric:5.4.42"
    modCompileOnly "maven.modrinth:jade:1.17.2+fabric"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release.set(21)
}

jar {
    from("LICENSE") {
        rename { "${it}_${archivesBaseName}" }
    }
}

loom {
    runs {
        datagen {
            inherit server
            name "Data Generation"
            vmArg "-Dfabric-api.datagen"
            vmArg "-Dfabric-api.datagen.output-dir=${file("src/main/generated")}"
            vmArg "-Dfabric-api.datagen.modid=fabricaeexnihilo"
            ideConfigGenerated = true
            runDir "build/datagen/"
        }
    }

    mods {
        fabricaeexnihilo {
            sourceSet sourceSets.main
            modFiles.from file("src/main/generated")
        }
    }
}

tasks.register('copyDatagenOverrides', Copy) {
    from "run/config/fabric_loader_dependencies.json"
    into "build/datagen/config"
}

clean.finalizedBy(tasks.copyDatagenOverrides)
tasks.runDatagen.dependsOn(tasks.copyDatagenOverrides)
clean.delete("src/main/generated")

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
