plugins {
    id 'fabric-loom' version "$loom_version"
    id 'maven-publish'
}

group = 'com.ngcsonsplash.fabricaeexnihilo'
version = '1.0.0+mc' + minecraft_version
archivesBaseName = 'FabricExNihilo'

repositories {
    mavenCentral()
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://maven.shedaniel.me/" }
    maven { url "https://maven.terraformersmc.com/" }
    maven { url "https://maven.isxander.dev/releases" }
    maven { url "https://maven.wispforest.io" }
    maven { url "https://maven.architectury.dev/" }
    maven { url "https://maven.modrinth.com/repository/releases" }
    maven { url "https://jitpack.io" }
}

dependencies {
    minecraft "com.mojang:minecraft:$minecraft_version"
    mappings "net.fabricmc:yarn:$yarn_mappings:v2"
    modImplementation "net.fabricmc:fabric-loader:$loader_version"
    modImplementation "net.fabricmc.fabric-api:fabric-api:$fabric_version"

    // Mod libraries
    modImplementation "dev.isxander:yet-another-config-lib:$yacl_version"
    modCompileOnly "me.shedaniel:RoughlyEnoughItems-api-fabric:$rei_version"
    modCompileOnly "com.terraformersmc:modmenu:$modmenu_version"
    modCompileOnly "dev.emi:emi-fabric:$emi_version:api"
    modCompileOnly "dev.architectury:architectury-fabric:$architectury_version"
    modCompileOnly "maven.modrinth:jade:$jade_version+fabric"
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
    it.options.release.set(21)
}

jar {
    from("LICENSE") {
        rename { "${it}_${archivesBaseName}" }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
