name: Build and Release FabricExNihilo

on:
  push:
    branches:
      - main
  workflow_dispatch: # để chạy thủ công nếu cần

jobs:
  build-and-release:
    name: Build and Release Mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Build mod
        run: ./gradlew clean build --stacktrace

      - name: Get current GMT+0 datetime
        id: datetime
        run: |
          echo "GMT_DATE=$(date -u +"%Y-%m-%d %H:%M:%S GMT+0")" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "build-${{ github.run_number }}"
          release_name: "FabricExNihilo Build #${{ github.run_number }}"
          body: "Build created at ${{ env.GMT_DATE }} (GMT+0)"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mod to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/libs/*.jar
          asset_name: FabricExNihilo-1.21.11.jar
          asset_content_type: application/java-archive
